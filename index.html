    </div>

  </section>

    <div class="panel">

            <button id="nextBtn" disabled>Siguiente</button>
          </div>
        </div>
      </div>
    </div>
  </section>

    </div>
    <div id="review" class="reviewList"></div>

</main>

const $ = s => document.querySelector(s);
const state = { pool: [], current: 0, correct: 0, answers: [], selected: null, examSelections: {} };
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function prepQuestion(q){
  const options = q.options.map((text,idx)=>({text, original:idx}));
  const out = {...q, options: $('#shuffleA').checked ? shuffle(options) : options};
  out.correctShown = out.options.findIndex(o=>o.original===q.answer);
  return out;
}
function renderStats(){
  const t1=BANK.filter(q=>q.tema==='TEMA 1').length, t2=BANK.filter(q=>q.tema==='TEMA 2').length;
  const failed=JSON.parse(localStorage.getItem('msecFailed')||'[]').length;
  $('#bankStats').innerHTML=`<div class="stat"><b>${BANK.length}</b><span>preguntas totales</span></div><div class="stat"><b>${t1}</b><span>Tema 1</span></div><div class="stat"><b>${t2}</b><span>Tema 2</span></div><div class="stat"><b>${failed}</b><span>falladas guardadas</span></div>`;
}
function start(){
  let pool = BANK.map((q,i)=>({...q,id:i}));
  const topic=$('#topic').value;
  if(topic==='failed'){
    const failed=new Set(JSON.parse(localStorage.getItem('msecFailed')||'[]'));
    pool=pool.filter(q=>failed.has(q.id));
    if(!pool.length){ alert('No hay preguntas falladas guardadas.'); return; }
  } else if(topic!=='all') pool=pool.filter(q=>q.tema===topic);
  if($('#shuffleQ').checked) pool=shuffle(pool);
  const n=$('#count').value==='all'?pool.length:Math.min(parseInt($('#count').value,10),pool.length);
  state.pool=pool.slice(0,n).map(prepQuestion); state.current=0; state.correct=0; state.answers=[]; state.selected=null; state.examSelections={};
  $('#setup').classList.add('hidden'); $('#results').classList.add('hidden'); $('#quiz').classList.remove('hidden'); renderQuestion();
}
function renderQuestion(){
  const q=state.pool[state.current]; state.selected=null;
  $('#counter').textContent=`Pregunta ${state.current+1} de ${state.pool.length}`;
  $('#liveScore').textContent=`Aciertos: ${state.correct}/${state.answers.length}`;
  $('#progress').style.width=`${(state.current/state.pool.length)*100}%`;
  $('#badge').textContent=q.tema;
  $('#qtext').textContent=q.question;
  $('#feedback').className='feedback'; $('#feedback').textContent=''; $('#nextBtn').disabled=$('#mode').value==='instant';
  $('#answers').innerHTML='';
  q.options.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='answer'; b.textContent=`${'ABCD'[i]}. ${o.text}`; b.onclick=()=>selectAnswer(i); $('#answers').appendChild(b);
  });
}
function selectAnswer(i){
  const q=state.pool[state.current]; const mode=$('#mode').value; state.selected=i;
  [...document.querySelectorAll('.answer')].forEach((b,idx)=>{b.disabled=false;b.classList.toggle('reveal',idx===i && mode==='exam');});
  if(mode==='exam'){ state.examSelections[state.current]=i; $('#nextBtn').disabled=false; return; }
  const ok=i===q.correctShown; const buttons=[...document.querySelectorAll('.answer')];
  buttons.forEach((b,idx)=>{ b.disabled=true; if(idx===q.correctShown)b.classList.add('correct'); if(idx===i&&!ok)b.classList.add('wrong'); });
  $('#feedback').className='feedback '+(ok?'ok':'bad'); $('#feedback').textContent= ok ? 'Correcto.' : `Incorrecto. Respuesta correcta: ${'ABCD'[q.correctShown]}. ${q.options[q.correctShown].text}`;
  state.answers[state.current]={id:q.id, question:q.question, tema:q.tema, ok, chosen:i, correct:q.correctShown, options:q.options.map(o=>o.text)};
  if(ok) state.correct++;
  $('#liveScore').textContent=`Aciertos: ${state.correct}/${state.answers.filter(Boolean).length}`; $('#nextBtn').disabled=false;
}
function next(){
  if($('#mode').value==='exam'){
    const q=state.pool[state.current], chosen=state.examSelections[state.current];
    if(chosen===undefined){ state.answers[state.current]={id:q.id, question:q.question, tema:q.tema, ok:false, chosen:null, correct:q.correctShown, options:q.options.map(o=>o.text)}; }
    else { const ok=chosen===q.correctShown; state.answers[state.current]={id:q.id, question:q.question, tema:q.tema, ok, chosen, correct:q.correctShown, options:q.options.map(o=>o.text)}; if(ok && !state.answers[state.current].counted){ state.correct++; state.answers[state.current].counted=true; } }
  }
  if(state.current < state.pool.length-1){ state.current++; renderQuestion(); } else finish();
}
function skip(){ state.selected=null; $('#nextBtn').disabled=false; next(); }
function finish(){
  $('#progress').style.width='100%'; $('#quiz').classList.add('hidden'); $('#results').classList.remove('hidden');
  const done=state.pool.length; const correct=state.answers.filter(a=>a&&a.ok).length; const pct=Math.round(correct/done*100);
  $('#finalScore').textContent=`${pct}%`; $('#finalTitle').textContent=`${correct} aciertos de ${done}`; $('#finalText').textContent=pct>=80?'Buen resultado. Repasa solo las falladas.':pct>=60?'Resultado aceptable. Conviene repetir las falladas.':'Conviene repasar el tema y repetir el test.';
  const failedIds=state.answers.filter(a=>!a?.ok).map(a=>a.id); const old=new Set(JSON.parse(localStorage.getItem('msecFailed')||'[]')); failedIds.forEach(id=>old.add(id)); if(failedIds.length===0) state.answers.forEach(a=>old.delete(a.id)); localStorage.setItem('msecFailed', JSON.stringify([...old])); renderStats();
  const review=state.answers.filter(a=>!a?.ok).map(a=>`<div class="reviewItem"><div><span class="pill bad">Fallada</span><span class="small">${a.tema}</span></div><b>${escapeHtml(a.question)}</b><div class="small" style="margin-top:8px">Tu respuesta: ${a.chosen===null?'Sin responder':escapeHtml('ABCD'[a.chosen]+'. '+a.options[a.chosen])}</div><div class="small">Correcta: ${escapeHtml('ABCD'[a.correct]+'. '+a.options[a.correct])}</div></div>`).join('');
  $('#review').innerHTML= review || '<div class="reviewItem"><span class="pill ok">Sin fallos</span> No hay preguntas que repasar.</div>';
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function quit(){ $('#quiz').classList.add('hidden'); $('#setup').classList.remove('hidden'); }
$('#startBtn').onclick=start; $('#nextBtn').onclick=next; $('#skipBtn').onclick=skip; $('#quitBtn').onclick=quit; $('#newTest').onclick=()=>{ $('#results').classList.add('hidden'); $('#setup').classList.remove('hidden');};
$('#retryFailed').onclick=()=>{ $('#topic').value='failed'; $('#count').value='all'; $('#results').classList.add('hidden'); $('#setup').classList.remove('hidden'); start();};
$('#clearFailed').onclick=()=>{ localStorage.removeItem('msecFailed'); renderStats(); };
$('#exportResults').onclick=async()=>{ const txt=`Test 02MSEC\nResultado: ${$('#finalTitle').textContent} (${$('#finalScore').textContent})\nFalladas: ${state.answers.filter(a=>!a?.ok).length}`; await navigator.clipboard.writeText(txt); alert('Resumen copiado.'); };
document.addEventListener('keydown',e=>{ if($('#quiz').classList.contains('hidden')) return; const k=e.key; if(['1','2','3','4'].includes(k)){ const idx=parseInt(k)-1; const b=document.querySelectorAll('.answer')[idx]; if(b&&!b.disabled) b.click(); } if(k==='Enter'&&!$('#nextBtn').disabled) next(); });
renderStats();
